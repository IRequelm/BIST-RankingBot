name: Nightly Research

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  research:
    name: Run research and reporting
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run research pipeline
        run: python main.py

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.telegram_notifier

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: bist-rankingbot-results
          path: |
            results/
            paper_trading/
          if-no-files-found: error

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/ paper_trading/ data/
          if git diff --cached --quiet; then
            echo "No research output changes to commit."
          else
            git commit -m "Update nightly research results"
            git push
          fi
